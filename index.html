<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects Hub</title>

<!-- ── SEO & Open Graph ── -->
<!-- Update these meta tags to match your repo -->
<meta name="description" content="A collection of projects deployed from a single GitHub repository.">
<meta property="og:title"       content="Projects Hub">
<meta property="og:description" content="A collection of projects deployed from a single GitHub repository.">
<meta property="og:type"        content="website">
<!-- <meta property="og:url"    content="https://your-username.github.io/your-repo/"> -->
<!-- <meta property="og:image" content="https://your-username.github.io/your-repo/og-image.png"> -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
</head>
<body>

<a class="skip-link" href="#project-grid">Skip to projects</a>

<header>
  <p class="eyebrow">github.com/nilayb12/Cheatsheet</p>
  <h1>Projects</h1>
  <p class="subtitle">A collection of projects deployed from a single repository.</p>
</header>

<div class="divider"><hr></div>

<div class="grid-wrap">

  <!-- ── Search & filter controls ── -->
  <div class="controls" role="search">
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input
        type="search"
        id="search-input"
        class="search-input"
        placeholder="Search projects…"
        aria-label="Search projects by name or description"
        autocomplete="off"
        spellcheck="false"
      >
      <button class="search-clear" id="search-clear" aria-label="Clear search" hidden>
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="tag-filters" id="tag-filters" role="group" aria-label="Filter by tag"></div>
  </div>

  <div class="grid" id="project-grid" role="list" aria-label="Projects">
    <p class="state-msg" aria-live="polite">Loading projects…</p>
  </div>

  <p class="no-results" id="no-results" hidden>
    No projects match <span id="no-results-term"></span>.
  </p>

</div>

<footer>
  <span>Hosted on GitHub Pages</span>
  <span>Edit <code>projects.json</code> to add entries</span>
</footer>

<script src="main.js"></script>
</body>
</html>
